            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;

            color: #c9a227;
        }

            font-size: 0.8rem;
            color: #666;
        }

        .section-arrow {
            color: #666;

        }

        .section-books {
            display: none;
            padding: 8px;
        }

        .book-link {
            display: block;
            padding: 10px 12px;
            color: #e0e0e0;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .book-link:hover {
            background: #1a1a1f;
            text-decoration: none;
            color: #c9a227;
        }

            display: none;
            margin-bottom: 24px;
            background: #111;
            border: 1px solid #c9a227;
            border-radius: 8px;
            padding: 12px;

            color: #c9a227;
            font-size: 0.9rem;
            margin-bottom: 12px;

        .no-results { color: #888; font-style: italic; }

            text-align: center;
            padding: 24px 16px;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid #222;
            margin-top: 24px;
        }

        .suggest-section {
            background: #1a1a1f;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
        }

        .suggest-section h3 {
            color: #c9a227;
            margin-bottom: 12px;
        }

        .suggest-form { display: flex; flex-direction: column; gap: 10px; }

        .suggest-input, .suggest-textarea {
            padding: 10px;
            background: #0a0a0f;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: inherit;
        }

        .suggest-textarea { min-height: 80px; resize: vertical; }

        .suggest-btn {
            padding: 10px 20px;
            background: #c9a227;
            color: #0a0a0f;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;

        };

        // Render sections
        const sectionsEl = document.getElementById('sections');

        Object.entries(LIBRARY).forEach(([name, books], idx) => {
            const section = document.createElement('div');
            section.className = 'section' + (idx === 0 ? ' open' : '');

            section.innerHTML = `
                <div class="section-header">
                    <span class="section-title">${name}</span>
                    <span class="section-count">${books.length}</span>
                    <span class="section-arrow">▶</span>
                </div>
                <div class="section-books">
                    ${books.map(b => `<a href="${b.url}" class="book-link">${b.title}</a>`).join('')}
                </div>
            `;

            section.querySelector('.section-header').addEventListener('click', () => {
                section.classList.toggle('open');
            });

            sectionsEl.appendChild(section);
        });

        // Search - Using SmartSearch for synonym expansion and scoring
        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('search-results');
        const resultsList = document.getElementById('results-list');

        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.trim();

            if (q.length < 2) {
                searchResults.classList.remove('active');
                return;
            }

            // Use SmartSearch term expansion for synonyms
            const terms = SmartSearch.expandTerms(q);
            const matches = [];

            Object.entries(LIBRARY).forEach(([section, books]) => {
                books.forEach(book => {
                    // Create searchable text from title and section
                    const text = `${book.title} ${section}`;
                    const score = SmartSearch.score(text, terms);

                    if (score > 0) {
                        matches.push({ ...book, section, score });
                    }
                });
            });

            // Sort by relevance score
            matches.sort((a, b) => b.score - a.score);

            if (matches.length) {
                resultsList.innerHTML = matches.map(m =>
                    `<a href="${m.url}" class="book-link">${m.title} <span style="color:#666">— ${m.section}</span></a>`
                ).join('');
            } else {
                resultsList.innerHTML = '<p class="no-results">No results found. Try: soul, kappa, torsion, 1729, voynich, norse, geometry...</p>';
            }

            searchResults.classList.add('active');
        });

        // Keyboard shortcut - ESC to clear
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                searchResults.classList.remove('active');
            }
        });

        // Auto-search from URL ?q= parameter (e.g., from header search bar)
        const urlQ = new URLSearchParams(window.location.search).get('q');
        if (urlQ) {
            searchInput.value = urlQ;
            searchInput.dispatchEvent(new Event('input'));
            searchInput.focus();
        }

        // Suggest form
        document.getElementById('suggest-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = {
                email: fd.get('email'),
                message: fd.get('message'),
                date: new Date().toISOString()
            };

            const subs = JSON.parse(localStorage.getItem('hmm-suggestions') || '[]');
            subs.push(data);
            localStorage.setItem('hmm-suggestions', JSON.stringify(subs));

            e.target.reset();
            document.getElementById('success-msg').classList.add('show');
            setTimeout(() => {
                document.getElementById('success-msg').classList.remove('show');
            }, 3000);
        });
    </script>
    <site-footer></site-footer>
</body>
</html>
